# Nginx Production Configuration
# Default expectation: on-premises deployment with TLS (PEMs in docker/nginx/ssl/).
# server_name lists internal DNS names (e.g. *.arbr.int); add public DNS when you expose the app to the internet.

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Map to check if origin is trustworthy for COOP/COEP headers
# Only localhost, 127.0.0.1, HTTPS origins, and [::1] are trustworthy
map $host $is_trustworthy_origin {
    default 0;
    ~^localhost(:[0-9]+)?$ 1;
    ~^127\.0\.0\.1(:[0-9]+)?$ 1;
    ~^\[::1\](:[0-9]+)?$ 1;  # IPv6 localhost
}
# Note: HTTPS origins are automatically trustworthy, but this map helps for HTTP

upstream node_app {
    server node:8069;
}

upstream node_admin {
    server node:8059;
}

upstream node_file {
    server node:8079;
}

upstream node_media {
    server node:8089;
}

upstream node_stream {
    server node:8099;
}

upstream python_server {
    server python:8049;
}

# Rate limiting - Set extremely high to only trigger in extreme DDoS cases
# Normal application usage should never hit these limits
# Increased limits to handle application startup bursts (many simultaneous API calls)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10000r/s;  # 10000 requests per second (increased from 1000)
limit_req_zone $binary_remote_addr zone=media_limit:10m rate=5000r/s;  # 5000 requests per second for media (increased from 500)

# HTTP server block — redirects to HTTPS (self-signed or CA-issued PEMs in /etc/nginx/ssl)
# For future Let's Encrypt HTTP-01, you would add location /.well-known/acme-challenge/ before the redirect.
server {
    listen 80;
    listen [::]:80;
    # Internal DNS + VM IP (Host header when users open https://10.100.30.110 — change IP if your VM moves)
    server_name ta-npl-dis-ui01 ta-npl-dis-ui01.arbr.int dis-ui.arbr.int 10.100.30.110 localhost;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Client body size (for file uploads - video files can be 3GB+)
    # If you get 413 from nginx and use another nginx/reverse proxy in front, set client_max_body_size 5G there too
    client_max_body_size 5G;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Exact /api/health on HTTP only: Docker healthcheck, VM diagnostics, and scripts use wget/curl
    # without TLS. A server-wide "return 301" made those checks follow HTTPS and fail on self-signed
    # certs while nginx still looked "unhealthy". Browsers and the app use https:// on 443 below.
    location = /api/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_app/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block - production with SSL
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ta-npl-dis-ui01 ta-npl-dis-ui01.arbr.int dis-ui.arbr.int 10.100.30.110 localhost;
    
    # SSL: PEMs from ./servers/docker/nginx/ssl on the host -> /etc/nginx/ssl in container.
    # On-prem: generate-self-signed.sh (quick) or generate-internal-ca-for-network-trust.sh (CA cert you distribute — see ssl/INTERNAL_SSL.txt).
    # Public / Let's Encrypt later: place fullchain.pem + privkey.pem here and extend server_name if needed.
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL protocol and cipher configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # COOP/COEP headers required for SharedArrayBuffer (SQLite WASM OPFS)
    # HTTPS origins are automatically trustworthy
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    
    # Client body size (for file uploads - video files can be 3GB+)
    # If you get 413 from nginx and use another nginx/reverse proxy in front, set client_max_body_size 5G there too
    client_max_body_size 5G;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Worker files - MUST come before / location block to be matched correctly
    # Serve from /workers/ directory with correct MIME type and COOP/COEP headers
    location /workers/ {
        root /usr/share/nginx/html;
        add_header Content-Type application/javascript always;
        # COOP/COEP headers required for SharedArrayBuffer (SQLite WASM OPFS) and workers
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # SPA fallback: serve index.html with no-cache so users always get latest app after deploy
    location @spa_index {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # Direct request to index.html - no-cache so deploy updates are picked up
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Frontend static files (production build)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ @spa_index;
        index index.html;
        
        # WASM files - must be served with correct MIME type
        location ~* \.wasm$ {
            add_header Content-Type application/wasm;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Also handle worker files in assets/js/ (if any) with correct MIME type
        location ~* (processor|worker).*\.js$ {
            add_header Content-Type application/javascript always;
            # COOP/COEP headers for workers in assets/js/
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoints (must come before general API routes)
    # All health endpoints now use /api/health consistently
    location /api/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_app/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/admin/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_admin/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/file/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_file/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/media/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_media/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/stream/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_stream/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/python/health {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://python_server/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    # Auth endpoints - NO rate limiting (must come before general /api block)
    # These endpoints are critical for login, refresh, and session validation
    location /api/auth {
        # No rate limiting for auth endpoints to prevent login/session issues
        
        # Proxy to node server, preserving the full path
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses
        proxy_buffering off;
        
        # Don't intercept errors
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Data endpoints - NO rate limiting (must come before general /api block)
    # These endpoints are critical for data fetching and should not be rate limited
    location /api/data {
        # No rate limiting for data endpoints
        
        # Proxy to node server, preserving the full path
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses
        proxy_buffering off;
        
        # Don't intercept errors
        proxy_intercept_errors off;
        
        # Larger timeouts for data operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_cookie_path / /;
    }

    # Events endpoints - NO rate limiting for data fetching
    # These endpoints are used for fetching event data and map data
    location /api/events {
        # No rate limiting for events/data endpoints
        
        # Proxy to node server, preserving the full path
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses
        proxy_buffering off;
        
        # Don't intercept errors
        proxy_intercept_errors off;
        
        # Larger timeouts for data operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_cookie_path / /;
    }

    # Channel values endpoint - Extended timeouts for InfluxDB queries
    # Must come before general /api/ location to match first
    location /api/channel-values {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Extended timeouts for InfluxDB queries (180s to match InfluxDB client timeout + buffer)
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        
        proxy_cookie_path / /;
    }

    # API routes - Main application server
    location /api/ {
        limit_req zone=api_limit burst=50000 nodelay;  # Very high burst to handle application startup bursts (increased from 5000)
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin SSE endpoint (must come before general /api/admin/ route)
    location /api/admin/events/upload-progress {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/events/upload-progress;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Long timeouts for SSE (video encoding can take 30+ min; keep stream open)
        proxy_connect_timeout 300s;
        proxy_send_timeout 86400s;  # 24 hours
        proxy_read_timeout 86400s;  # 24 hours
        proxy_cookie_path / /;
    }

    # Admin polling endpoint (must come before general /api/admin/ route)
    location /api/admin/api/upload/progress {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/upload/progress;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin logs route - DELETE /api/admin/logs goes to server_admin
    location = /api/admin/logs {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/logs;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin log_activity, user_activity, and timezones routes - routed to server_app
    location ~ ^/api/admin/(log_activity|user_activity|timezones) {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Logging routes - route to server_admin (must come before /api/admin/ to match first)
    location /api/log {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/log;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin API routes - all other /api/admin/ routes go to server_admin (includes video upload /api/admin/upload/video)
    location /api/admin/ {
        client_max_body_size 5G;
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cookie_path / /;
    }

    # File API routes - NO rate limiting for data fetching
    # Use prefix match without trailing slash to match both /api/file and /api/file/
    location /api/file {
        client_max_body_size 5G;
        # No rate limiting for file/data endpoints
        
        # Proxy directly to file server - it handles both /api/file and /api routes
        # No rewrite needed since file server mounts routes at both paths
        proxy_pass http://node_file;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Larger timeouts for file operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_cookie_path / /;
    }

    # Media/Video streaming - special handling
    location /api/media/video {
        limit_req zone=media_limit burst=10000 nodelay;  # High burst for video streaming (increased from 2000)
        
        proxy_pass http://node_media/api/video;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for video streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Range request support (for video seeking)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # Large timeouts for video streaming
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable caching for video
        proxy_cache_bypass $http_range;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        proxy_cookie_path / /;
    }

    # Other media API routes - NO rate limiting for data fetching
    location /api/media/ {
        # No rate limiting for media metadata endpoints (sources, etc.)
        
        proxy_pass http://node_app/api/media/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Stream server (WebSocket support for realtime data)
    location /api/stream/ {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_stream/api/stream/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # WebSocket timeouts (longer for persistent connections)
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        
        proxy_cookie_path / /;
    }

    # Python/FastAPI server (SSE support)
    location /api/python/ {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://python_server/api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE/WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Extended timeouts for long-running scripts (up to 60 minutes + buffer)
        # Scripts can take up to 60 minutes (30 min processing + 30 min execution)
        proxy_connect_timeout 300s;
        proxy_send_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        proxy_read_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        
        # Disable all buffering for SSE so completion events reach the client immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_max_temp_file_size 0;
        
        proxy_cookie_path / /;
    }

    # Health checks
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }
}

