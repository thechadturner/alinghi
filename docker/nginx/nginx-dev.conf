# Nginx Development Configuration
# Used when running in development mode (Vite dev server)

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Map to check if origin is trustworthy for COOP/COEP headers
# Only localhost/127.0.0.1 are trustworthy - network IPs (even over HTTPS) are not
# Browsers ignore COOP/COEP headers for untrustworthy origins and show warnings
map "$scheme:$host" $is_trustworthy_origin {
    default 0;
    ~^https:localhost(:[0-9]+)?$ 1;
    ~^https:127\.0\.0\.1(:[0-9]+)?$ 1;
    ~^https:\[::1\](:[0-9]+)?$ 1;  # IPv6 localhost
    ~^http:localhost(:[0-9]+)?$ 1;
    ~^http:127\.0\.0\.1(:[0-9]+)?$ 1;
    ~^http:\[::1\](:[0-9]+)?$ 1;  # IPv6 localhost
}

# Map to conditionally set COOP header value (empty for untrustworthy origins)
map "$is_trustworthy_origin" $coop_header {
    default "";
    1 "same-origin";
}

# Map to conditionally set COEP header value (empty for untrustworthy origins)
map "$is_trustworthy_origin" $coep_header {
    default "";
    1 "require-corp";
}

upstream vite_dev {
    # Use host IP directly for Windows Docker compatibility
    # host.docker.internal resolves to Docker VM IP which may not be accessible
    server 192.168.0.18:3000;  # Vite dev server on host machine
    # Fallback to host.docker.internal if direct IP doesn't work
    # server host.docker.internal:3000 backup;
}

upstream hunidb_dev {
    server host.docker.internal:5174;  # HuniDB dev server on host machine
}

upstream node_app {
    server node:8069;
}

upstream node_admin {
    server node:8059;
}

upstream node_file {
    server node:8079;
}

upstream node_media {
    server node:8089;
}

upstream node_stream {
    server node:8099;
}

upstream python_server {
    server python:8049;
}

# Rate limiting - Set extremely high to only trigger in extreme DDoS cases
# Normal application usage should never hit these limits
# Increased limits to handle application startup bursts (many simultaneous API calls)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10000r/s;  # 10000 requests per second (increased from 1000)
limit_req_zone $binary_remote_addr zone=media_limit:10m rate=5000r/s;  # 5000 requests per second for media (increased from 500)

# HTTP server - redirects to HTTPS for SharedArrayBuffer support
server {
    listen 80;
    server_name _;  # Accept any hostname
    
    # Redirect HTTP to HTTPS (optional - comment out if you want HTTP to work)
    # return 301 https://$host$request_uri;
    
    # Security headers (less strict for development)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # COOP/COEP headers required for SharedArrayBuffer (SQLite WASM OPFS)
    # Set unconditionally - browsers will ignore for untrustworthy origins (like 192.168.0.18)
    # Warnings are already suppressed in frontend code (frontend/index.tsx)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    
    # Client body size (for file uploads - video files can be 3GB+)
    # If you get 413 from nginx and use another nginx/reverse proxy in front, set client_max_body_size 5G there too
    client_max_body_size 5G;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;  # More verbose for dev

    # HuniDB Admin Page and all its assets - proxy to HuniDB dev server (port 5174)
    # This allows the admin page to be accessed from the same origin as the dashboard
    # so IndexedDB databases are shared between them
    # Access at: http://192.168.0.18/hunidb
    
    # Handle admin.html (with or without query parameters)
    # This MUST come before the root location to catch all admin.html requests
    # Nginx automatically passes query strings, so we just need to match the path
    location = /admin.html {
        proxy_pass http://hunidb_dev/admin.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Don't buffer - stream immediately
        proxy_buffering off;
    }
    
    # HuniDB admin page at /hunidb
    location = /hunidb {
        # Proxy to admin.html on HuniDB dev server
        proxy_pass http://hunidb_dev/admin.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for HMR (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Don't buffer - stream immediately
        proxy_buffering off;
    }
    
    # Also support /hunidb.html for backward compatibility
    location = /hunidb.html {
        proxy_pass http://hunidb_dev/admin.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
    
    # HuniDB Vite HMR WebSocket endpoints (must come before static assets)
    location ~ ^/(@vite|@id|@react-refresh|@vite/client) {
        proxy_pass http://hunidb_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
    
    # HuniDB static assets and modules (JS, CSS, WASM, etc.)
    # These paths are used by Vite/HuniDB dev server
    # Note: Only match HuniDB-specific paths, not general libs (which goes to main Vite)
    location ~ ^/(@hunico|@fs|src|assets|examples)/ {
        proxy_pass http://hunidb_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_buffering off;
    }
    
    # Main Vite server needs access to libs for workspace packages
    # This must come before the HuniDB location blocks
    location ~ ^/libs/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_intercept_errors off;
    }
    
    # HuniDB-specific node_modules (only if under examples or libs/huni_db)
    # This is more specific and will only match HuniDB's own node_modules
    location ~ ^/(examples|libs/huni_db)/node_modules/ {
        proxy_pass http://hunidb_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }

    # Vite HMR WebSocket - MUST come before other location blocks
    location /@vite {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Vite client WebSocket
    location /@vite/client {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WASM files - must come before node_modules to ensure they're routed correctly
    location ~ \.wasm$ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Let Vite set the MIME type (it knows how to serve WASM correctly)
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Pass through all headers from Vite
        proxy_pass_header Content-Type;
    }

    # Vite static assets (node_modules, @fs, etc.) - must come before root location
    location ~ ^/(node_modules|@fs|@id|@react-refresh)/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Extended timeouts for dependency optimization and large files
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 300s;      # 5 minutes for sending
        proxy_read_timeout 300s;      # 5 minutes for reading (Vite may take time optimizing deps)
        
        proxy_buffering off;
        proxy_intercept_errors off;
    }
    
    # Frontend source files - must come before root location
    location ~ ^/frontend/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Extended timeouts for dependency optimization and large files
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 300s;      # 5 minutes for sending
        proxy_read_timeout 300s;      # 5 minutes for reading (Vite may take time optimizing deps)
        
        proxy_buffering off;
        proxy_intercept_errors off;
    }

    # Vite dev server (frontend)
    location / {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for HMR (handles both / and /?token=... requests)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Disable buffering for HMR
        proxy_buffering off;
        
        # Extended timeouts for WebSocket connections (HMR needs long-lived connections)
        # Also need longer timeouts for initial dependency optimization
        proxy_connect_timeout 300s;  # 5 minutes for initial connection (Vite may optimize deps)
        proxy_send_timeout 86400s;  # 24 hours for WebSocket
        proxy_read_timeout 86400s;  # 24 hours for WebSocket
        
        # Don't intercept errors - let Vite handle 404s for SPA routing
        proxy_intercept_errors off;
        
        # Better error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 1;
    }

    # Health check endpoints - NO rate limiting (must come before general API routes)
    # All health endpoints now use /api/health consistently
    location /api/health {
        # No rate limiting for health checks
        proxy_pass http://node_app/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/admin/health {
        # No rate limiting for health checks
        proxy_pass http://node_admin/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/media/health {
        # No rate limiting for health checks
        proxy_pass http://node_media/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/stream/health {
        # No rate limiting for health checks
        proxy_pass http://node_stream/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    location /api/python/health {
        # No rate limiting for health checks
        proxy_pass http://python_server/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    # Auth endpoints - NO rate limiting (must come before general /api block)
    # These endpoints are critical for login, refresh, and session validation
    location /api/auth {
        # No rate limiting for auth endpoints to prevent login/session issues
        
        # Proxy to node server, preserving the full path
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend (especially content-type)
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately (important for JSON)
        proxy_buffering off;
        
        # Don't intercept errors - let backend handle them
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Events endpoints - NO rate limiting for data fetching
    # These endpoints are used for fetching event data and map data
    location /api/events {
        # No rate limiting for events/data endpoints
        
        # Proxy to node server, preserving the full path
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately
        proxy_buffering off;
        
        # Don't intercept errors
        proxy_intercept_errors off;
        
        # Larger timeouts for data operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_cookie_path / /;
    }

    # File API routes - MUST come before general /api location to ensure proper routing
    # Use prefix match without trailing slash to match both /api/file and /api/file/
    location /api/file {
        client_max_body_size 5G;
        limit_req zone=api_limit burst=50000 nodelay;
        
        # Proxy directly to file server - it handles both /api/file and /api routes
        # No rewrite needed since file server mounts routes at both paths
        proxy_pass http://node_file;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Larger timeouts for file operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_cookie_path / /;
    }

    # File health check - comes after /api/file to allow it to match first
    location /api/file/health {
        # No rate limiting for health checks
        proxy_pass http://node_file/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        access_log off;
    }

    # Channel values endpoint - Extended timeouts for InfluxDB queries
    # Must come before general /api location to match first
    location /api/channel-values {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Extended timeouts for InfluxDB queries (180s to match InfluxDB client timeout + buffer)
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        
        proxy_cookie_path / /;
    }

    # API routes - Main application server
    # Must come after specific /api/* locations to allow them to match first
    location /api {
        limit_req zone=api_limit burst=50000 nodelay;  # Very high burst to handle application startup bursts (increased from 5000)
        
        # Proxy to node server, preserving the full path (no trailing slash = preserves URI)
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend (especially content-type)
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately (important for JSON)
        proxy_buffering off;
        
        # Don't intercept errors - let backend handle them
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin SSE endpoint (must come before general /api/admin/ route)
    location /api/admin/events/upload-progress {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/events/upload-progress;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Long timeouts for SSE (video encoding can take 30+ min; keep stream open)
        proxy_connect_timeout 300s;
        proxy_send_timeout 86400s;  # 24 hours
        proxy_read_timeout 86400s;  # 24 hours
        proxy_cookie_path / /;
    }

    # Admin polling endpoint (must come before general /api/admin/ route)
    location /api/admin/api/upload/progress {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/upload/progress;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin logs route - DELETE /api/admin/logs goes to server_admin
    location = /api/admin/logs {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/logs;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin log_activity, user_activity, and timezones routes - routed to server_app
    location ~ ^/api/admin/(log_activity|user_activity|timezones) {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Logging routes - route to server_admin (must come before /api/admin/ to match first)
    location /api/log {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/log;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Admin API routes - all other /api/admin/ routes go to server_admin (includes video upload /api/admin/upload/video)
    location /api/admin/ {
        client_max_body_size 5G;
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_admin/api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cookie_path / /;
    }

    # Media/Video streaming - special handling
    location /api/media/video {
        limit_req zone=media_limit burst=10000 nodelay;  # High burst for video streaming (increased from 2000)
        
        proxy_pass http://node_media/api/video;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for video streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Range request support (for video seeking)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # Large timeouts for video streaming
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable caching for video
        proxy_cache_bypass $http_range;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        proxy_cookie_path / /;
    }

    # Other media API routes - NO rate limiting for data fetching
    location /api/media/ {
        # No rate limiting for media metadata endpoints (sources, etc.)
        
        proxy_pass http://node_app/api/media/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cookie_path / /;
    }

    # Stream server WebSocket endpoint (must come before /api/stream/ to match first)
    location /api/stream/ws {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_stream/api/stream/ws;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket upgrade support (critical for WebSocket connections)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Extended timeouts for WebSocket connections (handshake can take time)
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 86400s;    # 24 hours for WebSocket
        proxy_read_timeout 86400s;    # 24 hours for WebSocket
        
        proxy_cookie_path / /;
    }

    # Stream server (WebSocket support for realtime data)
    location /api/stream/ {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_stream/api/stream/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Extended timeouts for WebSocket connections (handshake can take time)
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 86400s;    # 24 hours for WebSocket
        proxy_read_timeout 86400s;    # 24 hours for WebSocket
        
        proxy_cookie_path / /;
    }

    # Python/FastAPI server (SSE support)
    location /api/python/ {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://python_server/api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE/WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_intercept_errors off;
        
        # Extended timeouts for long-running scripts (up to 60 minutes + buffer)
        # Scripts can take up to 60 minutes (30 min processing + 30 min execution)
        proxy_connect_timeout 300s;
        proxy_send_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        proxy_read_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        
        # Disable buffering for SSE
        proxy_buffering off;
        
        proxy_cookie_path / /;
    }

    # Health checks
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }
}

# HTTPS server block - enables SharedArrayBuffer for network IPs like 192.168.0.18
# SSL certificates are generated in docker/nginx/ssl/
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    
    # SSL configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # COOP/COEP headers - Set unconditionally (browsers ignore for untrustworthy origins)
    # Network IPs (like 192.168.0.18) are not trustworthy even over HTTPS
    # Warnings are already suppressed in frontend code (frontend/index.tsx)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    
    # Client body size (for file uploads - video files can be 3GB+)
    # If you get 413 from nginx and use another nginx/reverse proxy in front, set client_max_body_size 5G there too
    client_max_body_size 5G;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;
    
    # Include all location blocks from HTTP server
    # For now, we'll add the essential ones - you can copy the rest from the HTTP server block above
    # Note: All location blocks from the HTTP server (lines 71-785) should be duplicated here
    
    # Vite HMR WebSocket - MUST come before root location
    location /@vite {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
    
    # Vite client WebSocket
    location /@vite/client {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
    
    # WASM files - must come before node_modules to ensure they're routed correctly
    location ~ \.wasm$ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_intercept_errors off;
        proxy_pass_header Content-Type;
    }

    # Vite static assets (node_modules, @fs, etc.) - must come before root location
    location ~ ^/(node_modules|@fs|@id|@react-refresh)/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Extended timeouts for dependency optimization and large files
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 300s;      # 5 minutes for sending
        proxy_read_timeout 300s;      # 5 minutes for reading (Vite may take time optimizing deps)
        
        proxy_buffering off;
        proxy_intercept_errors off;
    }
    
    # Frontend source files - must come before root location
    location ~ ^/frontend/ {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Extended timeouts for dependency optimization and large files
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 300s;      # 5 minutes for sending
        proxy_read_timeout 300s;      # 5 minutes for reading (Vite may take time optimizing deps)
        
        proxy_buffering off;
        proxy_intercept_errors off;
    }

    # HuniDB Admin Page and all its assets - proxy to HuniDB dev server (port 5174)
    # These mirror the HTTP server locations so that both the main app and
    # the HuniDB admin run under the same HTTPS origin (https://192.168.0.18),
    # which is required for sharing IndexedDB between them.

    # Handle admin.html (with or without query parameters)
    location = /admin.html {
