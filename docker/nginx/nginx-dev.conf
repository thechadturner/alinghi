        proxy_read_timeout 300s;
        proxy_cache_bypass $http_range;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_cookie_path / /;
    }

    # Other media API routes - NO rate limiting for data fetching
    location /api/media/ {
        proxy_pass http://node_app/api/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cookie_path / /;
    }

    # Stream server WebSocket endpoint (must come before /api/stream/ to match first)
    location /api/stream/ws {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_stream/api/stream/ws;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade support (critical for WebSocket connections)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        # Extended timeouts for WebSocket connections (handshake can take time)
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 86400s;    # 24 hours for WebSocket
        proxy_read_timeout 86400s;    # 24 hours for WebSocket
        proxy_cookie_path / /;
    }

    # Stream server (WebSocket support for realtime data)
    location /api/stream/ {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_stream/api/stream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_intercept_errors off;
        # Extended timeouts for WebSocket connections (handshake can take time)
        proxy_connect_timeout 300s;  # 5 minutes for initial connection
        proxy_send_timeout 86400s;    # 24 hours for WebSocket
        proxy_read_timeout 86400s;    # 24 hours for WebSocket
        proxy_cookie_path / /;
    }

    # Python/FastAPI server (SSE support)
    location /api/python/ {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://python_server/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass_header Content-Type;
        proxy_intercept_errors off;
        # Extended timeouts for long-running scripts (up to 60 minutes + buffer)
        # Scripts can take up to 60 minutes (30 min processing + 30 min execution)
        proxy_connect_timeout 300s;
        proxy_send_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        proxy_read_timeout 5400s;  # 90 minutes (allows for 60 min script + buffer)
        proxy_buffering off;
        proxy_cookie_path / /;
    }

    # Channel values endpoint - Extended timeouts for InfluxDB queries
    # Must come before general /api location to match first
    location /api/channel-values {
        limit_req zone=api_limit burst=50000 nodelay;
        
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve response headers from backend
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        
        # Don't buffer responses - stream them immediately
        proxy_buffering off;
        proxy_intercept_errors off;
        
        # Extended timeouts for InfluxDB queries (180s to match InfluxDB client timeout + buffer)
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        
        proxy_cookie_path / /;
    }

    # API routes - Main application server (catch-all, must come after specific /api/* locations)
    location /api {
        limit_req zone=api_limit burst=50000 nodelay;
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;
        proxy_buffering off;
        proxy_intercept_errors off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cookie_path / /;
    }
    
    # Health check
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }
}

