<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Vitest report favicons stored under /assets/vitest -->
    <link rel="icon" href="./vitest/favicon.ico" sizes="48x48">
    <link rel="icon" href="./vitest/favicon.svg" sizes="any" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const setting = localStorage.getItem("vueuse-color-scheme") || "auto";
        if (setting === "dark" || (prefersDark && setting !== "light"))
          document.documentElement.classList.toggle("dark", true);
      })();
    </script>
    <!-- Metadata is stored under /assets/vitest as generated by Vitest -->
    <script>window.METADATA_PATH="./vitest/html.meta.json.gz"</script>
    <!-- Bundled JS/CSS for the Vitest UI reporter lives under /assets -->
    <script type="module" src="./index-D_ryMEPs.js"></script>
    <link rel="stylesheet" href="./index-X8b7Z_4p.css">
  </head>

  </body>
