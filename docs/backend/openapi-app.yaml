  /api/users/disable:
    put:
      summary: Disable user (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Updated }

  
  # Unified Filtering System Endpoints
  /api/classes/object:
    get:
      summary: Get class-specific object (e.g., filter configurations)
      parameters:
        - in: query
          name: class_name
          schema: { type: string }
          required: true
          description: Class name (e.g., 'ac75')
        - in: query
          name: project_id
          schema: { type: integer }
          required: true
          description: Project ID
        - in: query
          name: object_name
          schema: { type: string }
          required: true
          description: Object name (e.g., 'filters')
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Class object retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/ClassFilterConfig'
        '404':
          description: Object not found
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  # User Objects Management
  /api/users/object:
    get:
      summary: Get user-specific object (e.g., chart configurations)
      parameters:
        - in: query
          name: class_name
          schema: { type: string }
          required: true
        - in: query
          name: project_id
          schema: { type: integer }
          required: true
        - in: query
          name: user_id
          schema: { type: string }
          required: true
        - in: query
          name: parent_name
          schema: { type: string }
          required: true
        - in: query
          name: object_name
          schema: { type: string }
          required: true
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User object retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    description: User object data (chart configuration, etc.)
        '204':
          description: User object not found
        '401':
          description: Unauthorized
        '404':
          description: User objects table not found

    post:
      summary: Create or update user-specific object
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                class_name: { type: string }
                project_id: { type: integer }
                user_id: { type: string }
                parent_name: { type: string }
                object_name: { type: string }
                json: { type: string, description: JSON string }
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User object created/updated successfully
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    delete:
      summary: Delete user-specific object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                class_name: { type: string }
                project_id: { type: integer }
                user_id: { type: string }
                parent_name: { type: string }
                object_name: { type: string }
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User object deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Object not found
        '500':
          description: Internal server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Unified Filtering System Schemas
    ClassFilterConfig:
      type: object
      description: Class-specific filter configuration
      properties:
        class_name:
          type: string
          example: "AC75"
          description: Class name
        version:
          type: string
          example: "1.0"
          description: Configuration version
        filter_channels:
          type: array
          items:
            $ref: '#/components/schemas/FilterChannel'
          description: Available filter channels
        default_filters:
          type: array
          items:
            type: string
          example: ["Twa", "Race_number", "Leg_number", "Grade"]
          description: Default filter channels
        filter_types:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FilterTypeConfig'
          description: Filter type configurations
        required_for_filtering:
          type: boolean
          description: Whether filters are required
        cache_duration:
          type: integer
          example: 3600
          description: Cache duration in seconds

    FilterChannel:
      type: object
      description: Filter channel definition
      properties:
        name:
          type: string
          example: "Twa"
          description: Channel name (original case)
        type:
          type: string
          enum: ["float", "int", "string", "datetime"]
          example: "float"
          description: Data type
        display_name:
          type: string
          example: "True Wind Angle"
          description: Human-readable name
        description:
          type: string
          example: "Wind angle relative to boat heading"
          description: Channel description

    FilterTypeConfig:
      type: object
      description: Filter type configuration
      properties:
        type:
          type: string
          enum: ["directional", "numeric", "categorical"]
          example: "directional"
          description: Filter type
        options:
          type: array
          items:
            type: string
          example: ["upwind", "downwind", "reaching", "port", "stbd"]
          description: Available filter options
        ranges:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FilterRange'
          description: Range definitions for directional filters

    FilterRange:
      type: object
      description: Filter range definition
      properties:
        min:
          type: number
          example: 0
          description: Minimum value
        max:
          type: number
          example: 75
          description: Maximum value

    # Data endpoints
    ManeuverType:
      type: string
      enum: [tack, gybe, mark, start, finish, all]

