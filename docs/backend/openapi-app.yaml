    # Database Schema Schemas
    ClassObjectsTable:
      type: object
      description: Class objects table schema
      properties:
        object_id:
          type: integer
          format: serial
          description: Primary key
        object_name:
          type: string
          example: "filters"
          description: Object name
        json:
          type: object
          description: JSON data (filter configuration, etc.)
        date_modified:
          type: string
          format: date
          description: Last modification date

    UserObjectsTable:
      type: object
      description: User objects table schema
      properties:
        object_id:
          type: integer
          format: serial
          description: Primary key
        user_id:
          type: string
          description: User identifier
        parent_name:
          type: string
          example: "scatter"
          description: Parent component name
        object_name:
          type: string
          example: "default"
          description: Object name
        json:
          type: object
          description: JSON data (chart configuration, etc.)
        date_modified:
          type: string
          format: date
          description: Last modification date

    # Data Field Conventions
    DataFieldConventions:
      type: object
      description: Standard data field naming conventions
      properties:
        wind_angle:
          type: string
          example: "Twa"
          description: True Wind Angle (not 'twa')
        race_number:
          type: string
          example: "Race_number"
          description: Race Number (not 'race_number')
        leg_number:
          type: string
          example: "Leg_number"
          description: Leg Number (not 'leg_number')
        data_grade:
          type: string
          example: "Grade"
          description: Data Quality Grade (not 'grade')
        wind_speed:
          type: string
          example: "Tws"
          description: True Wind Speed (not 'tws')
        boat_speed:
          type: string
          example: "Bsp"
          description: Boat Speed (not 'bsp')
        datetime:
          type: string
          example: "Datetime"
          description: Timestamp field (not 'datetime')

    # Multi-Window Synchronization
    WindowMessage:
      type: object
      description: Cross-window message protocol
      properties:
        type:
          type: string
          enum: ["SELECTION_STORE_UPDATE", "FILTER_CHANGE", "WINDOW_READY"]
          description: Message type
        payload:
          type: object
          description: Message payload
        windowName:
          type: string
          description: Source window name

    FilterChangePayload:
      type: object
      description: Filter change payload for cross-window sync
      properties:
        type:
          type: string
          example: "FILTER_CHANGE"
          description: Payload type
        selectedStates:
          type: array
          items:
            type: string
          example: ["upwind", "downwind"]
          description: TWA filter states
        selectedRaces:
          type: array
          items:
            type: string
          example: ["1", "2"]
          description: Selected race numbers
        selectedLegs:
          type: array
          items:
            type: string
          example: ["1", "2", "3"]
          description: Selected leg numbers
        selectedGrades:
          type: array
          items:
            type: string
          example: ["1", "2"]
          description: Selected data quality grades

