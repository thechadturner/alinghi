      summary: Get project object
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: class_name
          required: true
          schema: { type: string }
        - in: query
          name: project_id
          required: true
          schema: { type: integer }
        - in: query
          name: object_name
          required: true
          schema: { type: string }
      responses:
