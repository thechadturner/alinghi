openapi: 3.0.3
info:
  title: TeamShare App API
  version: 0.1.0
  description: |
    Core read-optimized API for authentication, users, projects, datasets, events, targets, pages, and data.
    
    ## Database Schema
    For complete database schema documentation, see `docs/database/database-schema.md`.
    The database uses PostgreSQL with three main schemas: `admin`, `ac75`, and `gp50`.
    Schema definition: `database/hunico_database_emptry.sql`
    
    ## Key Features
    - **Unified Filtering System**: Class-specific filter configurations with cross-window synchronization
    - **Multi-Window Support**: Real-time data and filter synchronization across multiple browser windows
    - **Component-Specific Filters**: Charts can override unified filters with their own filtering logic
    - **Original Case Field Names**: Consistent field naming convention (Twa, Race_number, Leg_number, Grade)
    - **Performance Optimized**: Efficient filtering algorithms with early returns and smart caching
    
    ## Network Configuration
    The API supports multiple network configuration modes controlled by environment variables:
    - **Auto Mode** (default): Automatically detects localhost vs network IP based on access method
    - **Localhost Mode**: Forces all services to use localhost
    - **Network Mode**: Forces all services to use network IP
    - **Custom Mode**: Uses a specified custom host
    
    Default ports:
    - **API Server**: 8069
    - **Media Server**: 8089
    - **File Server**: 8079
    - **Admin Server**: 8059
    - **Python Server**: 8049

servers:
  - url: http://localhost:8069
    description: Local development (localhost mode)
  - url: http://127.0.0.1:8069
    description: Local development (127.0.0.1)
  - url: http://{host}:8069
    description: Network deployment (auto or network mode)
    variables:
      host:
        default: 192.168.1.100
        description: Network IP address or hostname
  - url: https://{host}:443
    description: Production with HTTPS (custom mode)
    variables:
      host:
        default: api.company.com
        description: Production API hostname

paths:
  /api/health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API server
      tags:
        - Health
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "app"
                  uptime:
                    type: number
                    description: Server uptime in seconds
                  timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
  /api/auth/autoLogin:
    post:
      summary: Auto login with legacy token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user_id: { type: string }
                      token: { type: string, description: JWT or legacy token }
        '401': { description: Unauthorized }
  
  # Authentication (JWT) - server_app
  /api/auth/user:
    get:
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current user info }
        '401': { description: Unauthorized }
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                rememberMe: { type: boolean }
      responses:
        '200': { description: Login successful }
        '401': { description: Invalid credentials }
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200': { description: Registration successful }
  /api/auth/verify:
    post:
      summary: Verify a newly registered user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                code: { type: string }
                rememberMe: { type: boolean }
      responses:
