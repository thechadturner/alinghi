  /api/auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200': { description: Token refreshed }
  /api/auth/logout:
    post:
      summary: Logout current session
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Logged out }
  /api/auth/forgot-password:
    post:
      summary: Start password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Email sent if user exists }
  /api/auth/reset-password:
    post:
      summary: Complete password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                code: { type: string }
                newPassword: { type: string, format: password }
      responses:
        '200': { description: Password reset }
  /api/projects:
    get:
      summary: List projects accessible to the user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Projects
          content:
            application/json:
