      responses:
        '200': { description: Updated }
    delete:
      summary: Delete project
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_id: { type: integer }
      responses:
