  /api/users:
    get:
      summary: Get user info by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: User }
    post:
      summary: Create user (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
